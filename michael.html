<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Michael Jackson</title>

<style>

/* BASE */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: #fff;

  background:
  linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)),
  url("michael-bg.jpg");

  background-size: cover;
  background-position: center;
  background-attachment: fixed;
}

/* SEÇÕES */
section {
  padding: 60px 20px;
  text-align: center;
}

.frase {
  font-style: italic;
  font-size: 1.4rem;
}

.box {
  max-width: 800px;
  margin: auto;
  background: rgba(255,255,255,0.05);
  padding: 20px;
  border-radius: 10px;
}

/* BOTÃO */
.btn {
  padding: 10px 20px;
  background: #0ea5e9;
  color: #fff;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

/* GRID ÁLBUNS */
.album-grid {
  display: flex;
  gap: 20px;
  justify-content: center;
  flex-wrap: wrap;
}

.album-card {
  width: 200px;
  cursor: pointer;
  transition: 0.3s;
}

.album-card img {
  width: 100%;
  border-radius: 10px;
}

.album-card:hover {
  transform: scale(1.08);
}

/* PLAYER */
.player {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.95);
  display: flex;
  flex-direction: column;
  padding: 20px;
  z-index: 999;
}

.hidden-player {
  display: none;
}

/* SCROLL */
.tracks-container {
  flex: 1;
  overflow-y: auto;
  scroll-snap-type: y mandatory;
}

.album-tracks {
  display: none;
}

.album-tracks.active {
  display: flex;
  flex-direction: column;
}

/* TRACK */
.track {
  scroll-snap-align: center;
  padding: 40px 20px;
  text-align: center;
  transition: 0.3s;
}

.track.playing {
  transform: scale(1.1);
  color: #0ea5e9;
}

/* PROGRESSO */
.progress {
  width: 80%;
  height: 6px;
  background: #333;
  margin: 10px auto;
  border-radius: 10px;
}

.bar {
  height: 100%;
  width: 0%;
  background: #0ea5e9;
}

/* LIKE */
.like {
  background: none;
  border: 2px solid #0ea5e9;
  color: #0ea5e9;
  padding: 5px 10px;
  border-radius: 20px;
  cursor: pointer;
}

.like.active {
  background: red;
  border-color: red;
  color: #fff;
}

/* ALERT */
#alert-container {
  position: fixed;
  top: 20px;
  right: 20px;
}

.alert {
  background: #111;
  padding: 10px;
  margin-bottom: 10px;
  border-left: 4px solid #0ea5e9;
  border-radius: 5px;
  opacity: 0;
  transform: translateX(30px);
  transition: 0.3s;
}

.alert.show {
  opacity: 1;
  transform: translateX(0);
}

</style>
</head>

<body>

<section>
  <h1>Michael Jackson</h1>
</section>

<section>
  <h2>Frase Icônica</h2>
  <p class="frase">I'm starting with the man in the mirror.</p>
</section>

<section>
  <h2>Álbuns Marcantes</h2>

  <div class="album-grid">

    <div class="album-card" data-album="thriller">
      <img src="thriller.jpg">
      <h3>Thriller</h3>
    </div>

    <div class="album-card" data-album="bad">
      <img src="bad.jpg">
      <h3>Bad</h3>
    </div>

  </div>
</section>

<!-- PLAYER -->
<div id="player" class="player hidden-player">

  <button class="btn close-player">Voltar</button>

  <div class="tracks-container">

    <!-- THRILLER -->
    <div class="album-tracks" data-album="thriller">

      <div class="track" data-id="beat-it">
        <span>Beat It</span>
        <audio src="beat-it.mp3"></audio>
        <div class="progress"><div class="bar"></div></div>
        <button class="like">❤</button>
      </div>

      <div class="track" data-id="billie-jean">
        <span>Billie Jean</span>
        <audio src="billie-jean.mp3"></audio>
        <div class="progress"><div class="bar"></div></div>
        <button class="like">❤</button>
      </div>

    </div>

    <!-- BAD -->
    <div class="album-tracks" data-album="bad">

      <div class="track" data-id="smooth">
        <span>Smooth Criminal</span>
        <audio src="smooth-criminal.mp3"></audio>
        <div class="progress"><div class="bar"></div></div>
        <button class="like">❤</button>
      </div>

    </div>

  </div>

</div>

<script>

/* ALERT */
const urna = document.createElement("div");
urna.id = "alert-container";
document.body.appendChild(urna);

function criarAlert(msg) {
  const el = document.createElement("div");
  el.className = "alert";
  el.textContent = msg;
  urna.appendChild(el);

  setTimeout(() => el.classList.add("show"), 50);

  setTimeout(() => {
    el.classList.remove("show");
    setTimeout(() => el.remove(), 300);
  }, 2000);
}

/* PLAYER */
const player = document.getElementById("player");

document.querySelectorAll(".album-card").forEach(card => {
  card.onclick = () => {
    const album = card.dataset.album;

    player.classList.remove("hidden-player");

    document.querySelectorAll(".album-tracks")
      .forEach(a => a.classList.remove("active"));

    document.querySelector(`[data-album="${album}"]`)
      .classList.add("active");
  };
});

/* FECHAR */
document.querySelector(".close-player").onclick = () => {
  player.classList.add("hidden-player");
  document.querySelectorAll("audio").forEach(a => a.pause());
};

/* PLAY */
document.querySelectorAll(".track").forEach(track => {

  const audio = track.querySelector("audio");
  const bar = track.querySelector(".bar");

  track.onclick = () => {

    document.querySelectorAll("audio").forEach(a => a.pause());
    document.querySelectorAll(".track").forEach(t => t.classList.remove("playing"));

    audio.play();
    track.classList.add("playing");
  };

  audio.ontimeupdate = () => {
    const p = (audio.currentTime / audio.duration) * 100;
    bar.style.width = p + "%";
  };

});

/* LIKE + LOCAL STORAGE */
const likes = JSON.parse(localStorage.getItem("likes")) || {};

document.querySelectorAll(".track").forEach(track => {

  const id = track.dataset.id;
  const btn = track.querySelector(".like");

  if (likes[id]) btn.classList.add("active");

  btn.onclick = (e) => {
    e.stopPropagation();

    btn.classList.toggle("active");
    likes[id] = btn.classList.contains("active");

    localStorage.setItem("likes", JSON.stringify(likes));

    criarAlert(likes[id] ? "Curtido ❤️" : "Descurtido 💔");
  };

});

</script>

</body>
</html>
