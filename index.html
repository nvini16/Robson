<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Corinthians | RJ</title>

<style>

/* =========================
   VARIÁVEIS
========================= */

:root {
  --bg: #000;
  --text: #fff;
  --card: #111;
  --accent: #c8102e;

  --section-bg: linear-gradient(135deg, #000, #1a1a1a);
  --overlay: rgba(0,0,0,0.5);
}

body.light {
  --bg: #f5f5f5;
  --text: #111;
  --card: #fff;
  --accent: #0ea5e9;

  --section-bg: linear-gradient(135deg, #e0f2fe, #ffffff);
  --overlay: rgba(255,255,255,0.6);
}

/* ========================= */

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: var(--bg);
  color: var(--text);
  transition: 0.3s;
}

header {
  background: var(--card);
  padding: 20px;
  text-align: center;
  border-bottom: 3px solid var(--accent);
}

nav a {
  margin: 0 10px;
  text-decoration: none;
  color: var(--text);
  font-weight: bold;
}

section {
  padding: 60px 20px;
  text-align: center;
}

.container {
  max-width: 900px;
  margin: auto;
}

/* ========================= */

.frase {
  font-size: 1.4rem;
  font-style: italic;
  background: var(--card);
  padding: 20px;
  border-left: 5px solid var(--accent);
  border-radius: 10px;
}

/* ========================= */

.foto-box img {
  width: 200px;
  border-radius: 15px;
  transition: 0.4s;
  border: 3px solid var(--accent);
}

.foto-box img:hover {
  transform: scale(1.08);
}

/* ========================= */

.corinthians {
  background: var(--section-bg);
  border-top: 2px solid var(--accent);
  border-bottom: 2px solid var(--accent);
}

/* ========================= */

.btn {
  margin-top: 20px;
  padding: 10px 20px;
  background: var(--accent);
  color: #fff;
  border: none;
  cursor: pointer;
  border-radius: 8px;
}

/* ========================= */

.hidden {
  opacity: 0;
  transform: translateY(30px);
  transition: 0.6s;
}

.show {
  opacity: 1;
  transform: translateY(0);
}

/* ========================= */

.escudo {
  width: 120px;
  transition: 0.3s;
  margin: 20px auto;
  border: 3px solid var(--accent);
  border-radius: 20px;
}

/* ========================= */

.bg-box1,
.bg-box2 {
  width: 100%;
  height: 300px;
  background-size: cover;
  background-position: center;
}

/* ========================= */

.menuinterative {
  padding: 15px;
  background: rgba(255,255,255,0.05);
  border-radius: 60px;
}

</style>
</head>

<body>

<header class="bg-box1">
  <h1>RJ</h1>

  <button onclick="toggleMusic()" class="btn">Música</button>

  <nav class="menuinterative">
    <a href="#frase">Frase</a>
    <a href="#sobre">Sobre</a>
    <a href="#time">Timão</a>
  </nav>
</header>

<section id="sobre" class="hidden">
  <div class="container">
    <h2>Sobre</h2>

    <div class="foto-box">
      <img 
        src="dark-profile.jpg"
        data-dark="dark-profile.jpg"
        data-light="light-profile.jpg"
        alt="Foto"
      >
    </div>

  </div>
</section>

<section id="time" class="corinthians hidden">
  <div class="container">

    <img 
      class="escudo"
      src="escuro.png"
      data-dark="escuro.png"
      data-light="claro.png"
    >

    <button class="btn" onclick="toggleTema()">Alternar Tema</button>

  </div>
</section>

<audio id="bg-music" loop>
  <source src="puma.m4a">
</audio>

<script>

/* =========================
   TEMA + IMAGENS
========================= */

function aplicarTema() {
  const isLight = document.body.classList.contains("light");

  document.querySelectorAll("img").forEach(img => {
    if (isLight && img.dataset.light) {
      img.src = img.dataset.light;
    } else if (!isLight && img.dataset.dark) {
      img.src = img.dataset.dark;
    }
  });
}

function toggleTema() {
  document.body.classList.toggle("light");
  aplicarTema();
}

/* =========================
   SCROLL
========================= */

const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add("show");
    }
  });
});

document.querySelectorAll(".hidden")
  .forEach(el => observer.observe(el));

/* =========================
   MÚSICA
========================= */

const music = document.getElementById("bg-music");
let tocando = false;

function toggleMusic() {
  tocando ? music.pause() : music.play();
  tocando = !tocando;
}

/* =========================
   INIT
========================= */

window.addEventListener("DOMContentLoaded", aplicarTema);

</script>

</body>
</html>
