<style>

:root {
  --bg: #000;
  --text: #fff;
  --card: #111;
  --accent: #c8102e; /* vermelho no dark */
}

body.light {
  --bg: #f5f5f5;
  --text: #111;
  --card: #fff;
--accent: #0ea5e9; /* azul meio neonzinho */
}



* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: var(--bg);
  color: var(--text);
  transition: 0.3s;
}

header {
  background: var(--card);
  padding: 20px;
  text-align: center;
  border-bottom: 3px solid var(--accent);
}

nav a {
  margin: 0 10px;
  text-decoration: none;
  color: var(--text);
  font-weight: bold;
}

section {
  padding: 60px 20px;
  text-align: center;
}

.container {
  max-width: 900px;
  margin: auto;
}

h2 {
  margin-bottom: 20px;
}

.frase {
  font-size: 1.4rem;
  font-style: italic;
  background: var(--card);
  padding: 20px;
  border-left: 5px solid var(--accent);
  border-radius: 10px;
}

/* FOTO ROBSON */
.foto-box {
  margin-top: 20px;
}

.foto-box img {
  width: 200px;
  border-radius: 15px;
  transition: 0.4s;
  border: 3px solid var(--accent);
}

.foto-box img:hover {
  transform: scale(1.08);
  filter: brightness(1.2);
}

/* CORINTHIANS */
.corinthians {
  background: linear-gradient(135deg, #000, #1a1a1a);
  border-top: 2px solid var(--accent);
  border-bottom: 2px solid var(--accent);
}

/* BOTÃO */
.btn {
  margin-top: 20px;
  padding: 10px 20px;
  background: var(--accent);
  color: #fff;
  border: none;
  cursor: pointer;
  border-radius: 8px;
}

/* CURIOSIDADE */
#curiosidade p {
  background: var(--card);
  padding: 20px;
  border-radius: 10px;
  line-height: 1.6;
}

/* ANIMAÇÃO */
.hidden {
  opacity: 0;
  transform: translateY(30px);
  transition: all 0.6s ease;
}

.show {
  opacity: 1;
  transform: translateY(0);
}

/* RESPONSIVO */
@media (max-width: 600px) {
  .foto-box img {
    width: 150px;
  }
}

  width: 120px;

    margin: 20px auto;

}

.escudo:hover {

}

.card {

  transition: 0.3s;
  border: 2px solid transparent;
}

.card:hover {
  transform: translateY(-8px);
  border-color: var(--accent);
}

========================= */

}

/* =========================

========================= */

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;

  transition: background 0.3s, color 0.3s, border 0.3s;
}

html {
  scroll-behavior: smooth;
}

body {
  background: var(--bg);
  color: var(--text);
  transition: 0.4s;
}

/* =========================
   HEADER
========================= */

header {
  background: var(--card);
  padding: 20px;
  text-align: center;
  border-bottom: 3px solid var(--accent);

/* =========================

========================= */

nav a {
  margin: 0 10px;
  text-decoration: none;
  color: var(--text);
  font-weight: bold;
  transition: 0.3s;

nav a:hover {
  color: var(--accent);
}

/* =========================
   SECTIONS
========================= */

section {
  padding: 60px 20px;

}

.container {
  max-width: 900px;
  margin: auto;
}

h2 {

}

========================= */

  transform: scale(1.08);
  filter: brightness(1.1);
}

/* =========================

========================= */

.corinthians {
  background: var(--section-bg);
  border-top: 2px solid var(--accent);

  color: #fff;

  transition: 0.3s;

.btn:hover {

.escudo:hover {

}

.ref-box {

}

.card {
  background: var(--card);
  padding: 20px;
  border-radius: 15px;
  width: 250px;
  border: 2px solid transparent;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-10px) scale(1.03);
  border-color: var(--accent);
  box-shadow: 0 15px 40px rgba(0,0,0,0.3);
}

body.light .card:hover {
  box-shadow: 0 15px 40px rgba(14,165,233,0.3);
}

.card img {
  width: 100%;
  border-radius: 10px;
  margin-bottom: 10px;
}

.card h3 {
  margin: 10px 0;
}

.card p {
  font-size: 0.95rem;
  opacity: 0.8;
}

/* =========================
   BACKGROUNDS
========================= */

.bg-box1,
.bg-box2 {
  width: 100%;
  height: 300px;
  background-size: cover;
  background-position: center;
}

/* overlay dinâmico */
.bg-box1 {
  background:
    linear-gradient(var(--overlay), var(--overlay)),
    url("papeis-de-parede-do-corinthians-uma-paixao-alvinegra-na-decoracao.jpg");
}

.bg-box2 {
  background:
    linear-gradient(var(--overlay), var(--overlay)),
    url("download (2).jpeg");
}

/* =========================
   MENU INTERATIVO
========================= */

.menuinterative {
  position: relative;
  padding: 15px 20px;
  border-radius: 60px;
  backdrop-filter: blur(20px);
  box-shadow: 0 15px 35px rgba(0,0,0,0.5);
  border: 1px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.08);
}

body.light .menuinterative {
  background: rgba(0,0,0,0.05);
}

/* =========================
   RESPONSIVO
========================= */

@media (max-width: 600px) {
  .foto-box img {
    width: 150px;
  }
}
</style>
</head>

<header class="bg-box1">
  <h1>RJ</h1>

  <nav>
    <button onclick="toggleMusic()" class="btn">Música</button>
  </nav>

  <br>

  <nav class="menuinterative">
    <a href="#frase">Frase</a>
    <a href="#sobre">Sobre</a>
    <a href="#time">Timão</a>
    <br><br>
    <a href="#referencias">Referências</a>
  </nav>
</header>

<!-- =========================
     SOBRE
========================= -->

<section id="sobre" class="hidden">
  <div class="container">
    <h2>Sobre o Robson</h2>

    <div class="foto-box">
      <img 
        src="dark-profile.jpg"
        data-dark="dark-profile.jpg"
        data-light="light-profile.jpg"
        alt="Foto do Robson"
      >
    </div>

  </div>
</section>

<!-- =========================
     FRASE
========================= -->

<section id="frase" class="hidden">
  <div class="container">
    <h2>Frase Marcante</h2>

    <p class="frase">
      "Não existe sorte ou azar. Se alguma coisa acontece é porque tinha que acontecer."
    </p>

  </div>
</section>

<!-- =========================
     TIME
========================= -->

<section id="time" class="corinthians hidden">
  <div class="container">
    <h2>Time do Coração</h2>

    <img 
      class="escudo"
      src="escudo-dark.png"
      data-dark="escudo-dark.png"
      data-light="escudo-light.png"
      alt="Escudo do Corinthians"
    >

    <p style="color: var(--accent); font-weight: bold;">
      Sport Club Corinthians Paulista
    </p>

    <button class="btn" onclick="toggleTema()">Alternar Tema</button>
  </div>
</section>

<!-- =========================
     REFERÊNCIAS
========================= -->

<section id="referencias" class="hidden">
  <div class="container">
    <h2>Referências</h2>

    <div class="ref-box">

      <div class="card">
        <img 
          src="neymar-dark.jpg"
          data-dark="neymar-dark.jpg"
          data-light="neymar-light.jpg"
          alt="Neymar"
        >
        <h3>Neymar</h3>
      </div>

      <div class="card">
        <img 
          src="messi-dark.jpg"
          data-dark="messi-dark.jpg"
          data-light="messi-light.jpg"
          alt="Messi"
        >
        <h3>Messi</h3>
      </div>

      <div class="card">
        <img 
          src="chama-dark.jpg"
          data-dark="chama-dark.jpg"
          data-light="chama-light.jpg"
          alt="Chama (Ben 10)"
        >
        <h3>CHAMA – (Ben 10)</h3>
      </div>

      <div class="card">
        <img 
          src="kaiser-dark.jpg"
          data-dark="kaiser-dark.jpg"
          data-light="kaiser-light.jpg"
          alt="Kaiser"
        >
        <h3>KAISER</h3>
      </div>

      <div class="card">
        <img 
          src="rangers-dark.jpg"
          data-dark="rangers-dark.jpg"
          data-light="rangers-light.jpg"
          alt="Power Rangers"
        >
        <h3>Power Rangers</h3>
      </div>

      <div class="card">
        <img 
          src="sonic-dark.jpg"
          data-dark="sonic-dark.jpg"
          data-light="sonic-light.jpg"
          alt="Sonic"
        >
        <h3>Sonic</h3>
      </div>

    </div>
  </div>
</section>

<!-- =========================
     ÁUDIO
========================= -->

<audio id="bg-music" loop>
  <source src="puma.m4a" type="audio/mp4">
</audio>

<!-- =========================
     FOOTER
========================= -->

<footer class="bg-box2"></footer>

<!-- =========================
     SCRIPT
========================= -->

<script>

/* =========================
   TEMA + IMAGENS
========================= */

function aplicarTema() {
  const isLight = document.body.classList.contains("light");

  document.querySelectorAll("img").forEach(img => {
    if (isLight && img.dataset.light) {
      img.src = img.dataset.light;
    } else if (!isLight && img.dataset.dark) {
      img.src = img.dataset.dark;
    }
  });
}

function toggleTema() {
  document.body.classList.toggle("light");
  aplicarTema();
}

/* =========================
   SCROLL REVEAL
========================= */

const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add("show");
    }
  });
});

document.querySelectorAll(".hidden")
  .forEach(el => observer.observe(el));

/* =========================
   MÚSICA
========================= */

const music = document.getElementById("bg-music");
let tocando = false;

function toggleMusic() {
  tocando ? music.pause() : music.play();
  tocando = !tocando;
}

/* =========================
   INIT
========================= */

window.addEventListener("DOMContentLoaded", aplicarTema);

</script>

</body>
